name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@ferrlabs'
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FERRLABS_PACKAGES_READ || secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test with coverage
        run: pnpm test:coverage
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Build
        run: pnpm build

  quality:
    name: Quality (knip, madge, audit)
    runs-on: ferrlabs-k8s
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@ferrlabs'
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FERRLABS_PACKAGES_READ || secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile
      - name: knip (dead code, unused exports & deps)
        run: pnpm dlx knip --reporter compact
        continue-on-error: true
      - name: madge (circular imports)
        run: pnpm dlx madge --circular --extensions ts,tsx,js,jsx src
        continue-on-error: true
      - name: pnpm audit (high+ only)
        run: pnpm audit --prod --audit-level=high
