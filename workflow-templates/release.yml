name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tag, no release)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Run FerrFlow
    runs-on: ferrlabs-k8s
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: FerrLabs/FerrFlow@v4
        with:
          dry_run: ${{ inputs.dry_run || false }}
          bot: true
