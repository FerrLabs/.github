version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]
    open-pull-requests-limit: 10
    groups:
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@eslint/*", "@typescript-eslint/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      astro:
        patterns: ["astro", "@astrojs/*"]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]
    open-pull-requests-limit: 10

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, docker]
