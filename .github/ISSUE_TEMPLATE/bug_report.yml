name: Bug report
description: Report a defect in a FerrLabs project
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please search existing issues first.
        For security vulnerabilities, do **not** use this form — see SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release version or commit SHA where you saw the bug.
      placeholder: "v1.4.2 or a1b2c3d"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug, including the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps, command, or code to reproduce.
      placeholder: |
        1. Run `...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, runtime versions, and how you installed it.
      placeholder: "Linux x86_64, installed via `cargo install`"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs or error output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
