name: Reusable — Docker build (lint, scan, sign, SBOM)

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Full image name (e.g. ghcr.io/ferrlabs/foo)'
        type: string
        required: true
      tag:
        description: 'Image tag (e.g. v1.2.3 or commit sha)'
        type: string
        required: true
      context:
        description: 'Docker build context'
        type: string
        required: false
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile relative to context'
        type: string
        required: false
        default: 'Dockerfile'
      platforms:
        description: 'Comma-separated build platforms. Multi-arch needs binfmt/qemu registered on the runner; the self-hosted ARC runners build linux/amd64 only.'
        type: string
        required: false
        default: 'linux/amd64'
      build-args:
        description: 'Newline-separated build args (KEY=VALUE)'
        type: string
        required: false
        default: ''
      extra-tags:
        description: 'Additional full image refs to tag, newline-separated (e.g. ghcr.io/ferrlabs/foo:sha-<gitsha> for traceability). Appended to <image-name>:<tag> and <image-name>:latest.'
        type: string
        required: false
        default: ''
      smoke-test-cmd:
        description: 'Shell command to functionally test the built image before it is pushed. When set, the image is built and loaded locally first (single-platform only — set platforms accordingly), this command runs with $SMOKE_IMAGE pointing at the loaded ref, and the registry push happens only if it passes. Empty = skip.'
        type: string
        required: false
        default: ''
      trivy-severity:
        description: 'Trivy severities that fail the build'
        type: string
        required: false
        default: 'CRITICAL,HIGH'
      trivy-exit-code:
        description: "Exit code when trivy finds matching vulns ('1' = gate the build, '0' = report-only). Base-derived images with unpatchable upstream CVEs use '0'."
        type: string
        required: false
        default: '1'
      push:
        description: 'Push the image to the registry'
        type: boolean
        required: false
        default: true
      push-retries:
        description: 'How many times to retry each manifest push if the registry returns a transient error (5xx, network reset). Backoff is 10s, 30s, 90s, … capped at 5 min. Set to 1 to disable retries.'
        type: number
        required: false
        default: 3
      runner:
        description: 'GitHub Actions runner label for the build job (the heavy one). Private consumers pass `ferrlabs-k8s`; public consumers leave the default.'
        type: string
        required: false
        default: 'ubuntu-latest'
    outputs:
      digest:
        description: 'Image digest (sha256:...)'
        value: ${{ jobs.build.outputs.digest }}
    secrets:
      packages-read:
        description: 'GHCR token with read:packages, for installing private @ferrlabs/* npm or other authenticated fetches during the build. Exposed to BuildKit as a secret (id=packages-read) via --mount=type=secret, never as a build-arg, so it never lands in an image layer or the build log. In the Dockerfile: RUN --mount=type=secret,id=packages-read,env=NODE_AUTH_TOKEN pnpm install.'
        required: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  hadolint:
    name: hadolint
    # Docker container action — needs a Docker daemon, which the self-hosted ARC
    # runners don't provide. Pin to GitHub-hosted ubuntu-latest; the heavy build
    # job below stays on the configured (self-hosted) runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ inputs.context }}/${{ inputs.dockerfile }}
          failure-threshold: warning
          # DL3008 (apt) / DL3018 (apk): pinning OS package versions is
          # impractical — Debian/Alpine point releases supersede them and exact
          # pins break the build. Every other warning still fails the gate.
          ignore: DL3008,DL3018

  build:
    name: Build & push
    needs: hadolint
    runs-on: ${{ inputs.runner }}
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # The self-hosted ARC runners have buildah, not a Docker daemon — so we
      # build/push with buildah (not docker/buildx). The cosign / Trivy / SBOM
      # jobs below pull the pushed image from the registry, so they need no
      # daemon either. packages-read is exposed to the build as a BuildKit-style
      # `--mount=type=secret,id=packages-read`, never as a build-arg.
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: buildah login -u "${{ github.actor }}" --password-stdin ghcr.io <<< "$GHCR_TOKEN"
      - name: Build & push (buildah)
        id: push
        env:
          IMAGE: ${{ inputs.image-name }}
          TAG: ${{ inputs.tag }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          PLATFORMS: ${{ inputs.platforms }}
          BUILD_ARGS: ${{ inputs.build-args }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
          PUSH: ${{ inputs.push }}
          PUSH_RETRIES: ${{ inputs.push-retries }}
          SMOKE_CMD: ${{ inputs.smoke-test-cmd }}
          PACKAGES_READ: ${{ secrets.packages-read }}
        run: |
          set -euo pipefail

          secret_args=()
          if [ -n "${PACKAGES_READ:-}" ]; then
            printf '%s' "$PACKAGES_READ" > "$RUNNER_TEMP/packages-read"
            secret_args=(--secret "id=packages-read,src=$RUNNER_TEMP/packages-read")
          fi

          build_arg_args=()
          while IFS= read -r line; do
            [ -n "$line" ] && build_arg_args+=(--build-arg "$line")
          done <<< "${BUILD_ARGS:-}"

          buildah build \
            --isolation=chroot --layers \
            --platform "$PLATFORMS" \
            "${secret_args[@]}" "${build_arg_args[@]}" \
            --manifest "$IMAGE:$TAG" \
            -f "$CONTEXT/$DOCKERFILE" "$CONTEXT"

          rm -f "$RUNNER_TEMP/packages-read"

          if [ -n "${SMOKE_CMD:-}" ]; then
            echo "::group::smoke test"
            SMOKE_IMAGE="$IMAGE:$TAG" bash -euo pipefail -c "$SMOKE_CMD"
            echo "::endgroup::"
          fi

          if [ "$PUSH" != "true" ]; then
            echo "digest=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # GHCR push periodically returns 504 Gateway Timeout or resets the
          # connection mid-manifest. The build itself is fine; only the manifest
          # upload flaps. Retry each push N times with exponential backoff
          # (10s, 30s, 90s, capped at 300s) before failing the job.
          retries="${PUSH_RETRIES:-3}"
          retry_push() {
            local attempt=1
            local delay=10
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -ge "$retries" ]; then
                echo "::error::manifest push failed after $attempt attempt(s): $*"
                return 1
              fi
              echo "::warning::manifest push attempt $attempt failed, retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 3))
              [ "$delay" -gt 300 ] && delay=300
            done
          }

          retry_push buildah manifest push --all --digestfile "$RUNNER_TEMP/digest" \
            "$IMAGE:$TAG" "docker://$IMAGE:$TAG"
          retry_push buildah manifest push --all "$IMAGE:$TAG" "docker://$IMAGE:latest"
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            retry_push buildah manifest push --all "$IMAGE:$TAG" "docker://$ref"
          done <<< "${EXTRA_TAGS:-}"

          echo "digest=$(cat "$RUNNER_TEMP/digest")" >> "$GITHUB_OUTPUT"

  trivy:
    name: Trivy (CVE scan)
    needs: build
    if: inputs.push
    runs-on: ${{ inputs.runner }}
    steps:
      # Trivy reads ~/.docker/config.json to pull the image; without this a
      # private GHCR image fails with a 401/manifest-unknown.
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ inputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: true
          exit-code: ${{ inputs.trivy-exit-code }}
      - name: Upload SARIF
        # Best-effort: code scanning upload needs GitHub Advanced Security,
        # which isn't available on private repos without a GHAS licence. The
        # real gate is trivy's exit-code:1 above; don't fail the build just
        # because the Security-tab integration is unavailable.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  cosign:
    name: cosign (sign + attest)
    needs: [build, trivy]
    if: inputs.push
    # cosign-installer needs `envsubst` (gettext), which the minimal self-hosted
    # ARC runners don't ship — it fails with "envsubst: command not found".
    # Signing only touches the remote GHCR digest, so pin to a GitHub-hosted
    # runner (same rationale as the hadolint job above).
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            "${{ inputs.image-name }}@${{ needs.build.outputs.digest }}"
      - name: Attest build provenance
        # Best-effort: GitHub artifact attestations are an org-plan feature
        # ("Feature not available for the … organization" otherwise). The
        # cosign keyless signature above is the real signing; don't fail the
        # build (and skip cosign) just because native provenance is off.
        continue-on-error: true
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

  sbom:
    name: SBOM (Syft → CycloneDX)
    needs: build
    if: inputs.push
    runs-on: ${{ inputs.runner }}
    steps:
      # Syft pulls the image via the Docker keychain (~/.docker/config.json);
      # a private GHCR image needs this login or the scan fails to fetch it.
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ inputs.image-name }}@${{ needs.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false
