name: Reusable — Docker build (lint, scan, sign, SBOM)

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Full image name (e.g. ghcr.io/ferrlabs/foo)'
        type: string
        required: true
      tag:
        description: 'Image tag (e.g. v1.2.3 or commit sha)'
        type: string
        required: true
      context:
        description: 'Docker build context'
        type: string
        required: false
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile relative to context'
        type: string
        required: false
        default: 'Dockerfile'
      platforms:
        description: 'Comma-separated build platforms'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      build-args:
        description: 'Newline-separated build args (KEY=VALUE)'
        type: string
        required: false
        default: ''
      extra-tags:
        description: 'Additional full image refs to tag, newline-separated (e.g. ghcr.io/ferrlabs/foo:sha-<gitsha> for traceability). Appended to <image-name>:<tag> and <image-name>:latest.'
        type: string
        required: false
        default: ''
      trivy-severity:
        description: 'Trivy severities that fail the build'
        type: string
        required: false
        default: 'CRITICAL,HIGH'
      trivy-exit-code:
        description: "Exit code when trivy finds matching vulns ('1' = gate the build, '0' = report-only). Base-derived images with unpatchable upstream CVEs use '0'."
        type: string
        required: false
        default: '1'
      push:
        description: 'Push the image to the registry'
        type: boolean
        required: false
        default: true
      runner:
        description: 'GitHub Actions runner label for the build job (the heavy one). Private consumers pass `ferrlabs-k8s`; public consumers leave the default.'
        type: string
        required: false
        default: 'ubuntu-latest'
    outputs:
      digest:
        description: 'Image digest (sha256:...)'
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  hadolint:
    name: hadolint
    # Docker container action — needs a Docker daemon, which the self-hosted ARC
    # runners don't provide. Pin to GitHub-hosted ubuntu-latest; the heavy build
    # job below stays on the configured (self-hosted) runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ inputs.context }}/${{ inputs.dockerfile }}
          failure-threshold: warning

  build:
    name: Build & push
    needs: hadolint
    runs-on: ${{ inputs.runner }}
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        id: push
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          provenance: mode=max
          sbom: true
          tags: |
            ${{ inputs.image-name }}:${{ inputs.tag }}
            ${{ inputs.image-name }}:latest
            ${{ inputs.extra-tags }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy:
    name: Trivy (CVE scan)
    needs: build
    if: inputs.push
    runs-on: ${{ inputs.runner }}
    steps:
      # Trivy reads ~/.docker/config.json to pull the image; without this a
      # private GHCR image fails with a 401/manifest-unknown.
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ inputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: true
          exit-code: ${{ inputs.trivy-exit-code }}
      - name: Upload SARIF
        # Best-effort: code scanning upload needs GitHub Advanced Security,
        # which isn't available on private repos without a GHAS licence. The
        # real gate is trivy's exit-code:1 above; don't fail the build just
        # because the Security-tab integration is unavailable.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  cosign:
    name: cosign (sign + attest)
    needs: [build, trivy]
    if: inputs.push
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            "${{ inputs.image-name }}@${{ needs.build.outputs.digest }}"
      - name: Attest build provenance
        # Best-effort: GitHub artifact attestations are an org-plan feature
        # ("Feature not available for the … organization" otherwise). The
        # cosign keyless signature above is the real signing; don't fail the
        # build (and skip cosign) just because native provenance is off.
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

  sbom:
    name: SBOM (Syft → CycloneDX)
    needs: build
    if: inputs.push
    runs-on: ${{ inputs.runner }}
    steps:
      # Syft pulls the image via the Docker keychain (~/.docker/config.json);
      # a private GHCR image needs this login or the scan fails to fetch it.
      - name: Login to GHCR
        if: startsWith(inputs.image-name, 'ghcr.io/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ inputs.image-name }}@${{ needs.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false
