name: Reusable — CI Node/TypeScript

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Package root (for monorepos / nested packages)'
        type: string
        default: '.'
      runner:
        description: 'Override the runner label. Empty (default) auto-selects by repo visibility: private repos use the self-hosted ferrlabs-k8s pool (ferrlabs-k8s-large for build/test jobs), public repos use ubuntu-latest.'
        type: string
        default: ''
      node-version:
        description: 'Node.js version'
        type: string
        default: '24'
      pnpm-version:
        description: 'pnpm version'
        type: string
        default: '10'
      package-manager:
        description: 'Package manager (pnpm, npm, yarn)'
        type: string
        default: 'pnpm'
      install-args:
        description: 'Extra args for the install command (e.g. --filter for monorepo)'
        type: string
        default: '--frozen-lockfile'
      script-runner:
        description: 'Command prefix for running package.json scripts. Override for monorepos to use --filter (e.g. "pnpm --filter @ferrvault/app")'
        type: string
        default: 'pnpm run'
      cache:
        description: 'Enable setup-node cache. Disable when no lockfile is committed yet.'
        type: boolean
        default: true
      registry-url:
        description: 'npm registry URL for scoped packages'
        type: string
        default: 'https://npm.pkg.github.com'
      registry-scope:
        description: 'Scope to attach to the registry (e.g. @ferrlabs)'
        type: string
        default: '@ferrlabs'
      typecheck-script:
        description: 'Script name for typecheck (in package.json)'
        type: string
        default: 'typecheck'
      lint-script:
        description: 'Script name for lint'
        type: string
        default: 'lint'
      test-script:
        description: 'Script name for tests with coverage'
        type: string
        default: 'test:coverage'
      build-script:
        description: 'Script name for build'
        type: string
        default: 'build'
      enable-typecheck:
        type: boolean
        default: true
      enable-lint:
        type: boolean
        default: true
      enable-test:
        type: boolean
        default: true
      enable-build:
        type: boolean
        default: true
      enable-knip:
        description: 'Run knip (dead code, unused exports & deps)'
        type: boolean
        default: true
      enable-madge:
        description: 'Run madge --circular'
        type: boolean
        default: true
      madge-paths:
        description: 'Path(s) for madge to scan'
        type: string
        default: 'src'
      enable-audit:
        description: 'Run package-manager audit'
        type: boolean
        default: true
      audit-level:
        description: 'Audit severity threshold (low, moderate, high, critical)'
        type: string
        default: 'high'
      coverage-upload:
        description: 'Upload coverage to Codecov'
        type: boolean
        default: true
      enable-sonar:
        description: 'Run SonarQube analysis (requires the SONAR_TOKEN secret)'
        type: boolean
        default: false
      sonar-project-key:
        description: 'SonarQube project key (defaults to the repo name; set per-call in monorepos to avoid colliding sub-projects)'
        type: string
        default: ''
      sonar-lcov-path:
        description: 'Path to the lcov report (relative to working-directory) imported as SonarQube coverage'
        type: string
        default: 'coverage/lcov.info'
      sonar-base-dir:
        description: 'SonarQube projectBaseDir, when it differs from working-directory (e.g. pnpm-workspace monorepos that install from the root but analyse a sub-package). Defaults to working-directory.'
        type: string
        default: ''
      coverage-upload-as:
        description: 'When set, upload this component lcov (rebased to repo-root-relative paths) under this artifact name, for a single repo-level Sonar scan to merge. Use in monorepos instead of enable-sonar to avoid sub-projects.'
        type: string
        default: ''
    secrets:
      CODECOV_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      # GitHub Packages read token. Either name works — `FERRLABS_PACKAGES_READ`
      # is the eventual canonical (post-rename), `FERRFLOW_PACKAGES_READ` is the
      # legacy from when the org was FerrFlow. Consumers can declare either.
      FERRLABS_PACKAGES_READ:
        required: false
      FERRFLOW_PACKAGES_READ:
        required: false

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s-large' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache && inputs.package-manager || '' }}
          cache-dependency-path: ${{ inputs.cache && format('{0}/{1}', inputs.working-directory, inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || inputs.package-manager == 'yarn' && 'yarn.lock' || 'package-lock.json') || '' }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.registry-scope }}
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FERRLABS_PACKAGES_READ || secrets.FERRFLOW_PACKAGES_READ || secrets.GITHUB_TOKEN }}
        run: ${{ inputs.package-manager }} install ${{ inputs.install-args }}
      - name: Typecheck
        if: inputs.enable-typecheck
        run: ${{ inputs.script-runner }} ${{ inputs.typecheck-script }}
      - name: Lint
        if: inputs.enable-lint
        run: ${{ inputs.script-runner }} ${{ inputs.lint-script }}
      - name: Test
        if: inputs.enable-test
        run: ${{ inputs.script-runner }} ${{ inputs.test-script }}
      - name: Upload coverage
        if: inputs.enable-test && inputs.coverage-upload
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          working-directory: ${{ inputs.working-directory }}
      - name: Hand lcov to the SonarQube job
        if: inputs.enable-sonar && inputs.enable-test
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonar-coverage-${{ inputs.sonar-project-key || github.event.repository.name }}
          path: ${{ inputs.working-directory }}/${{ inputs.sonar-lcov-path }}
          if-no-files-found: warn
          retention-days: 1
      # Monorepo path: rebase lcov SF: paths to repo-root-relative and upload so a
      # single repo-level Sonar scan (projectBaseDir=.) can merge several components.
      - name: Rebase lcov to repo root
        if: inputs.coverage-upload-as != '' && inputs.enable-test
        env:
          BASE: ${{ inputs.working-directory }}
          LCOV: ${{ inputs.sonar-lcov-path }}
        run: |
          mkdir -p "${{ runner.temp }}/sonarcov"
          # vitest emits SF: paths relative to the package dir; prefix the component
          # dir to make them repo-root-relative. Absolute paths (if any) get the
          # $GITHUB_WORKSPACE prefix stripped instead.
          awk -v ws="$GITHUB_WORKSPACE" -v base="$BASE" '
            /^SF:/ {
              p = substr($0, 4)
              if (substr(p, 1, length(ws) + 1) == ws "/") p = substr(p, length(ws) + 2)
              if (p !~ /^\//) { if (base != "." && substr(p, 1, length(base) + 1) != base "/") p = base "/" p }
              print "SF:" p; next
            }
            { print }
          ' "$LCOV" > "${{ runner.temp }}/sonarcov/${{ inputs.coverage-upload-as }}.lcov"
      - name: Upload rebased lcov
        if: inputs.coverage-upload-as != '' && inputs.enable-test
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.coverage-upload-as }}
          path: ${{ runner.temp }}/sonarcov/${{ inputs.coverage-upload-as }}.lcov
          if-no-files-found: warn
          retention-days: 1
      - name: Build
        if: inputs.enable-build
        run: ${{ inputs.script-runner }} ${{ inputs.build-script }}

  quality:
    name: Quality (knip, madge, audit)
    if: inputs.enable-knip || inputs.enable-madge || inputs.enable-audit
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache && inputs.package-manager || '' }}
          cache-dependency-path: ${{ inputs.cache && format('{0}/{1}', inputs.working-directory, inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || inputs.package-manager == 'yarn' && 'yarn.lock' || 'package-lock.json') || '' }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.registry-scope }}
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FERRLABS_PACKAGES_READ || secrets.FERRFLOW_PACKAGES_READ || secrets.GITHUB_TOKEN }}
        run: ${{ inputs.package-manager }} install ${{ inputs.install-args }}
      - name: knip
        if: inputs.enable-knip
        run: ${{ inputs.package-manager }} dlx knip --reporter compact
        continue-on-error: true
      - name: madge (circular imports)
        if: inputs.enable-madge
        run: ${{ inputs.package-manager }} dlx madge --circular --extensions ts,tsx,js,jsx ${{ inputs.madge-paths }}
        continue-on-error: true
      - name: audit
        if: inputs.enable-audit
        run: ${{ inputs.package-manager }} audit --prod --audit-level=${{ inputs.audit-level }}

  sonarqube:
    name: SonarQube
    # !cancelled() so analysis still runs when tests fail (coverage may be partial).
    if: inputs.enable-sonar && !cancelled()
    # needs: test so the coverage artifact exists before the scan downloads it.
    needs: test
    uses: FerrLabs/.github/.github/workflows/reusable-sonarqube-scan.yml@e4fa4cc7d67d251f457d76b55187524eeaede89e # main
    with:
      runner: ${{ inputs.runner }}
      working-directory: ${{ inputs.sonar-base-dir || inputs.working-directory }}
      project-key: ${{ inputs.sonar-project-key }}
      coverage-artifact: ${{ (inputs.enable-test && format('sonar-coverage-{0}', inputs.sonar-project-key || github.event.repository.name)) || '' }}
      args: ${{ inputs.enable-test && '-Dsonar.javascript.lcov.reportPaths=.sonarcov/lcov.info' || '' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
