name: Reusable — CI Rust

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Crate root (for monorepos / non-root crates)'
        type: string
        default: '.'
      runner:
        description: 'Override the runner label. Empty (default) auto-selects by repo visibility: private repos use the self-hosted ferrlabs-k8s pool (ferrlabs-k8s-large for build/test jobs), public repos use ubuntu-latest.'
        type: string
        default: ''
      rust-toolchain:
        description: 'Rust toolchain (stable, nightly, beta, or pinned version)'
        type: string
        default: 'stable'
      rust-components:
        description: 'Comma-separated rustup components'
        type: string
        default: 'clippy, rustfmt'
      rust-targets:
        description: 'Comma-separated rustup targets (optional)'
        type: string
        default: ''
      cargo-flags:
        description: 'Flags appended to cargo invocations (clippy, test, build)'
        type: string
        default: '--all-features'
      coverage-flags:
        description: 'Flags for the coverage run (llvm-cov). Defaults to cargo-flags. Set separately when cargo-flags already carries --workspace, to avoid passing it twice to llvm-cov which rejects duplicates.'
        type: string
        default: ''
      clippy-args:
        description: 'Args after the `--` separator for clippy'
        type: string
        default: '-D warnings'
      test-args:
        description: 'Extra args for cargo test'
        type: string
        default: ''
      check-fmt:
        description: 'Run `cargo fmt --check`'
        type: boolean
        default: true
      check-clippy:
        description: 'Run cargo clippy'
        type: boolean
        default: true
      run-tests:
        description: 'Run cargo test'
        type: boolean
        default: true
      enable-audit:
        description: 'Run cargo audit (RustSec advisories)'
        type: boolean
        default: true
      enable-deny:
        description: 'Run cargo deny check (advisories + bans + licenses + sources)'
        type: boolean
        default: true
      enable-machete:
        description: 'Run cargo machete (unused deps)'
        type: boolean
        default: true
      enable-typos:
        description: 'Run typos-cli'
        type: boolean
        default: true
      fail-on-audit:
        description: 'Fail the workflow on cargo audit advisories (often unfixable upstream)'
        type: boolean
        default: false
      fail-on-machete:
        description: 'Fail the workflow on cargo machete unused-dep findings'
        type: boolean
        default: false
      audit-ignore:
        description: 'Comma-separated RUSTSEC IDs to ignore (e.g. RUSTSEC-2023-0071)'
        type: string
        default: ''
      enable-coverage:
        description: 'Generate coverage and upload to Codecov'
        type: boolean
        default: true
      coverage-tool:
        description: 'Coverage tool (llvm-cov or tarpaulin)'
        type: string
        default: 'llvm-cov'
      cache:
        description: 'Enable Swatinem/rust-cache'
        type: boolean
        default: true
      skip-on-release-commit:
        description: 'Skip checks on push commits starting with chore(release):'
        type: boolean
        default: true
      ferrflow-hmac-secret-required:
        description: 'Whether the FERRFLOW_HMAC_SECRET secret should be wired up (FerrFlow only)'
        type: boolean
        default: false
      apt-packages:
        description: 'Space-separated apt packages to install before cargo (e.g. for OpenSSL or build deps). Only effective on Ubuntu runners.'
        type: string
        default: ''
      enable-sonar:
        description: 'Run SonarQube analysis (requires the SONAR_TOKEN secret)'
        type: boolean
        default: false
      sonar-project-key:
        description: 'SonarQube project key (defaults to the repo name; set per-call in monorepos to avoid colliding sub-projects)'
        type: string
        default: ''
      coverage-upload-as:
        description: 'When set, upload this crate lcov (rebased to repo-root-relative paths) under this artifact name, for a single repo-level Sonar scan to merge. Use in monorepos instead of enable-sonar to avoid sub-projects.'
        type: string
        default: ''
      run-integration-tests:
        description: 'Run a DB-backed integration step against the shared CI Postgres (postgres-ci in ns github-runner). Creates a fresh per-run database, runs the tests, drops it. Runs on the normal ferrlabs-k8s pool (Postgres is external, so the large pool is not needed).'
        type: boolean
        default: false
      integration-args:
        description: 'Full args passed to `cargo test` for the integration step (e.g. `--features integration --test idor_scoping -- --ignored`).'
        type: string
        default: ''
      integration-runner:
        description: 'Runner for the integration job. Empty auto-selects ferrlabs-k8s (normal pool) for private repos.'
        type: string
        default: ''
      integration-db-host:
        description: 'Host of the shared CI Postgres.'
        type: string
        default: 'postgres-ci.github-runner.svc.cluster.local'
      integration-db-port:
        description: 'Port of the shared CI Postgres.'
        type: string
        default: '5432'
      integration-db-user:
        description: 'Superuser of the shared CI Postgres (trust auth, no password).'
        type: string
        default: 'postgres'
      integration-db-env:
        description: 'Name of the env var the tests read the database URL from.'
        type: string
        default: 'TEST_DATABASE_URL'
    secrets:
      CODECOV_TOKEN:
        required: false
      FERRFLOW_HMAC_SECRET:
        required: false
      SONAR_TOKEN:
        required: false
      CARGO_REGISTRIES_KELLNR_TOKEN:
        required: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    env:
      CARGO_REGISTRIES_KELLNR_TOKEN: ${{ secrets.CARGO_REGISTRIES_KELLNR_TOKEN }}
    if: |
      (inputs.check-fmt || inputs.check-clippy || inputs.run-tests) && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s-large' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - if: inputs.apt-packages != '' && runner.os == 'Linux'
        name: Install apt packages
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.apt-packages }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: ${{ inputs.rust-components }}
          targets: ${{ inputs.rust-targets }}
      - if: inputs.cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.working-directory }}
      # Compiled-artifact cache on garage S3. Self-gating: no-op off our runners.
      - name: Setup sccache (garage S3)
        if: inputs.cache
        uses: FerrLabs/.github/.github/actions/setup-sccache@519a65c07cfdc448026e29aee2578d2212529d2f # main
        with:
          s3-key: ${{ secrets.SCCACHE_S3_KEY }}
          s3-secret: ${{ secrets.SCCACHE_S3_SECRET }}
      - name: Format check
        if: inputs.check-fmt
        run: cargo fmt --check
      - name: Clippy
        if: inputs.check-clippy
        env:
          FERRFLOW_HMAC_SECRET: ${{ secrets.FERRFLOW_HMAC_SECRET }}
        run: cargo clippy ${{ inputs.cargo-flags }} -- ${{ inputs.clippy-args }}
      - name: Tests
        if: inputs.run-tests
        env:
          FERRFLOW_HMAC_SECRET: ${{ secrets.FERRFLOW_HMAC_SECRET }}
        run: cargo test ${{ inputs.cargo-flags }} ${{ inputs.test-args }}

  # DB-backed integration tests. Postgres is provided out-of-band by the shared
  # `postgres-ci` pod (ns github-runner) instead of being apt-installed inside
  # the runner, so this job runs on the normal `ferrlabs-k8s` pool rather than
  # the scarce `-large` one. Each run gets an isolated, throwaway database.
  integration:
    name: Integration Tests
    if: |
      inputs.run-integration-tests && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    env:
      CARGO_REGISTRIES_KELLNR_TOKEN: ${{ secrets.CARGO_REGISTRIES_KELLNR_TOKEN }}
      PGHOST: ${{ inputs.integration-db-host }}
      PGPORT: ${{ inputs.integration-db-port }}
      PGUSER: ${{ inputs.integration-db-user }}
    runs-on: ${{ inputs.integration-runner != '' && inputs.integration-runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - if: inputs.apt-packages != '' && runner.os == 'Linux'
        name: Install apt packages
        env:
          APT_PACKAGES: ${{ inputs.apt-packages }}
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends $APT_PACKAGES
      - name: Install postgresql-client
        run: |
          if command -v createdb >/dev/null 2>&1; then exit 0; fi
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends postgresql-client
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: ${{ inputs.rust-components }}
          targets: ${{ inputs.rust-targets }}
      - if: inputs.cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.working-directory }}
          # sccache owns target/ — double-caching it thrashes disk (see the
          # runner lost-comms incident that first motivated this split).
          cache-targets: false
      # Compiled-artifact cache on garage S3. Self-gating: no-op off our runners.
      - name: Setup sccache (garage S3)
        if: inputs.cache
        uses: FerrLabs/.github/.github/actions/setup-sccache@519a65c07cfdc448026e29aee2578d2212529d2f # main
        with:
          s3-key: ${{ secrets.SCCACHE_S3_KEY }}
          s3-secret: ${{ secrets.SCCACHE_S3_SECRET }}
      - name: Create per-run database
        env:
          DB_ENV_NAME: ${{ inputs.integration-db-env }}
        run: |
          set -euo pipefail
          DB="ci_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_${RANDOM}"
          echo "Creating throwaway database $DB on ${PGHOST}:${PGPORT}"
          createdb "$DB"
          echo "CI_DB_NAME=$DB" >> "$GITHUB_ENV"
          echo "${DB_ENV_NAME}=postgres://${PGUSER}@${PGHOST}:${PGPORT}/${DB}" >> "$GITHUB_ENV"
      - name: Integration tests
        env:
          FERRFLOW_HMAC_SECRET: ${{ secrets.FERRFLOW_HMAC_SECRET }}
          INTEGRATION_ARGS: ${{ inputs.integration-args }}
        run: cargo test $INTEGRATION_ARGS
      - name: Drop per-run database
        if: always() && env.CI_DB_NAME != ''
        run: dropdb --if-exists "$CI_DB_NAME"

  security:
    name: Cargo Security
    env:
      CARGO_REGISTRIES_KELLNR_TOKEN: ${{ secrets.CARGO_REGISTRIES_KELLNR_TOKEN }}
    if: |
      (inputs.enable-audit || inputs.enable-deny || inputs.enable-machete) && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - if: inputs.apt-packages != '' && runner.os == 'Linux'
        name: Install apt packages
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.apt-packages }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
      - if: inputs.cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.working-directory }}
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-audit,cargo-deny,cargo-machete
      - name: cargo audit (RustSec advisories)
        if: inputs.enable-audit
        run: |
          IGNORES=""
          if [ -n "${{ inputs.audit-ignore }}" ]; then
            for id in $(echo "${{ inputs.audit-ignore }}" | tr ',' ' '); do
              IGNORES="$IGNORES --ignore $id"
            done
          fi
          set +e
          cargo audit --deny warnings $IGNORES
          EXIT=$?
          set -e
          if [ "${{ inputs.fail-on-audit }}" = "true" ]; then
            exit $EXIT
          fi
          if [ "$EXIT" != "0" ]; then
            echo "::warning::cargo audit found advisories (non-blocking — set fail-on-audit: true or update audit-ignore to act on them)"
          fi
      - name: cargo deny
        if: inputs.enable-deny
        run: cargo deny ${{ inputs.cargo-flags }} check
      - name: cargo machete (unused deps)
        if: inputs.enable-machete
        run: |
          set +e
          cargo machete
          EXIT=$?
          set -e
          if [ "${{ inputs.fail-on-machete }}" = "true" ]; then
            exit $EXIT
          fi
          if [ "$EXIT" != "0" ]; then
            echo "::warning::cargo machete found unused dependencies"
          fi

  typos:
    name: Typos
    if: inputs.enable-typos
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: crate-ci/typos@bc212b92c93b7d2c8acb5fcb114250694513595b # master
        with:
          files: ${{ inputs.working-directory }}

  coverage:
    name: Coverage
    env:
      CARGO_REGISTRIES_KELLNR_TOKEN: ${{ secrets.CARGO_REGISTRIES_KELLNR_TOKEN }}
    if: |
      inputs.enable-coverage && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s-large' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - if: inputs.apt-packages != '' && runner.os == 'Linux'
        name: Install apt packages
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.apt-packages }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: llvm-tools-preview
      - if: inputs.cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.working-directory }}
      # Compiled-artifact cache on garage S3. Self-gating: no-op off our runners.
      - name: Setup sccache (garage S3)
        if: inputs.cache
        uses: FerrLabs/.github/.github/actions/setup-sccache@519a65c07cfdc448026e29aee2578d2212529d2f # main
        with:
          s3-key: ${{ secrets.SCCACHE_S3_KEY }}
          s3-secret: ${{ secrets.SCCACHE_S3_SECRET }}
      - if: inputs.coverage-tool == 'llvm-cov'
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (llvm-cov)
        if: inputs.coverage-tool == 'llvm-cov'
        env:
          FERRFLOW_HMAC_SECRET: ${{ secrets.FERRFLOW_HMAC_SECRET }}
        run: cargo llvm-cov ${{ inputs.coverage-flags || inputs.cargo-flags }} --workspace --lcov --output-path lcov.info
      - name: Generate coverage (tarpaulin)
        if: inputs.coverage-tool == 'tarpaulin'
        env:
          FERRFLOW_HMAC_SECRET: ${{ secrets.FERRFLOW_HMAC_SECRET }}
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --out xml --skip-clean
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ${{ inputs.coverage-tool == 'llvm-cov' && 'lcov.info' || 'cobertura.xml' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          working-directory: ${{ inputs.working-directory }}
      - name: Hand coverage to the SonarQube job
        if: inputs.enable-sonar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonar-coverage-${{ inputs.sonar-project-key || github.event.repository.name }}
          path: ${{ inputs.working-directory }}/${{ inputs.coverage-tool == 'llvm-cov' && 'lcov.info' || 'cobertura.xml' }}
          if-no-files-found: warn
          retention-days: 1
      # Monorepo path: rebase lcov SF: paths to repo-root-relative and upload so a
      # single repo-level Sonar scan (projectBaseDir=.) can merge several components.
      - name: Rebase lcov to repo root
        if: inputs.coverage-upload-as != '' && inputs.coverage-tool == 'llvm-cov'
        env:
          BASE: ${{ inputs.working-directory }}
        run: |
          mkdir -p "${{ runner.temp }}/sonarcov"
          # llvm-cov emits absolute SF: paths; strip $GITHUB_WORKSPACE to make them
          # repo-root-relative (runner-independent). Relative paths (other tools)
          # get the component dir prefixed instead.
          awk -v ws="$GITHUB_WORKSPACE" -v base="$BASE" '
            /^SF:/ {
              p = substr($0, 4)
              if (substr(p, 1, length(ws) + 1) == ws "/") p = substr(p, length(ws) + 2)
              if (p !~ /^\//) { if (base != "." && substr(p, 1, length(base) + 1) != base "/") p = base "/" p }
              print "SF:" p; next
            }
            { print }
          ' lcov.info > "${{ runner.temp }}/sonarcov/${{ inputs.coverage-upload-as }}.lcov"
      - name: Upload rebased lcov
        if: inputs.coverage-upload-as != '' && inputs.coverage-tool == 'llvm-cov'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.coverage-upload-as }}
          path: ${{ runner.temp }}/sonarcov/${{ inputs.coverage-upload-as }}.lcov
          if-no-files-found: warn
          retention-days: 1

  sonarqube:
    name: SonarQube
    # !cancelled() so analysis runs even when the coverage job is skipped
    # (enable-coverage false / release commit) or fails — keep enable-coverage on
    # for full reports.
    if: inputs.enable-sonar && !cancelled()
    needs: coverage
    uses: FerrLabs/.github/.github/workflows/reusable-sonarqube-scan.yml@519a65c07cfdc448026e29aee2578d2212529d2f # main
    with:
      runner: ${{ inputs.runner }}
      working-directory: ${{ inputs.working-directory }}
      project-key: ${{ inputs.sonar-project-key }}
      coverage-artifact: ${{ inputs.enable-coverage && format('sonar-coverage-{0}', inputs.sonar-project-key || github.event.repository.name) || '' }}
      args: ${{ inputs.enable-coverage && (inputs.coverage-tool == 'llvm-cov' && '-Dsonar.rust.lcov.reportPaths=.sonarcov/lcov.info' || '-Dsonar.rust.cobertura.reportPaths=.sonarcov/cobertura.xml') || '' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
