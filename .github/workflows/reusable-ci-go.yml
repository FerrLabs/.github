name: Reusable — CI Go

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Module root (for non-root or multi-module repos)'
        type: string
        default: '.'
      runner:
        description: 'GitHub Actions runner label'
        type: string
        default: 'ubuntu-latest'
      go-version-file:
        description: 'Path to go.mod (relative to working-directory)'
        type: string
        default: 'go.mod'
      go-version:
        description: 'Override Go version (takes precedence over go-version-file if set)'
        type: string
        default: ''
      golangci-version:
        type: string
        default: 'latest'
      build-paths:
        description: 'Packages to build (default ./...)'
        type: string
        default: './...'
      test-paths:
        description: 'Packages to test (default ./...)'
        type: string
        default: './...'
      enable-fmt:
        type: boolean
        default: true
      enable-vet:
        type: boolean
        default: true
      enable-lint:
        type: boolean
        default: true
      enable-test:
        type: boolean
        default: true
      enable-race:
        description: 'Run go test with -race'
        type: boolean
        default: true
      enable-coverage:
        type: boolean
        default: true
      enable-vulncheck:
        description: 'Run govulncheck'
        type: boolean
        default: true
      fail-on-vulncheck:
        description: 'Fail the workflow on govulncheck findings (often unfixable upstream)'
        type: boolean
        default: false
      enable-build:
        type: boolean
        default: true
      skip-on-release-commit:
        description: 'Skip checks on push commits starting with chore(release):'
        type: boolean
        default: true
      enable-sonar:
        description: 'Run SonarQube analysis (requires the SONAR_TOKEN secret)'
        type: boolean
        default: false
      sonar-project-key:
        description: 'SonarQube project key (defaults to the repo name; set per-call in monorepos to avoid colliding sub-projects)'
        type: string
        default: ''
      sonar-base-dir:
        description: 'SonarQube projectBaseDir, when it differs from working-directory (e.g. multi-module repos analysed from the root). Defaults to working-directory.'
        type: string
        default: ''
      coverage-upload-as:
        description: 'When set, upload this module coverage profile under this artifact name, for a single repo-level Sonar scan to merge. Use in monorepos instead of enable-sonar to avoid sub-projects.'
        type: string
        default: ''
    secrets:
      CODECOV_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  detect:
    name: Detect Go module
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      has_go: ${{ steps.check.outputs.has_go }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f "${{ inputs.go-version-file }}" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: detect
    if: |
      needs.detect.outputs.has_go == 'true' && (inputs.enable-fmt || inputs.enable-vet || inputs.enable-lint) && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && format('{0}/{1}', inputs.working-directory, inputs.go-version-file) || '' }}
          cache: true
      - name: gofmt
        if: inputs.enable-fmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files need gofmt:"
            echo "$diff"
            exit 1
          fi
      - name: go vet
        if: inputs.enable-vet
        run: go vet ${{ inputs.test-paths }}
      - if: inputs.enable-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-version }}
          working-directory: ${{ inputs.working-directory }}

  test:
    name: Test
    needs: detect
    if: |
      needs.detect.outputs.has_go == 'true' && inputs.enable-test && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && format('{0}/{1}', inputs.working-directory, inputs.go-version-file) || '' }}
          cache: true
      - name: Test
        run: |
          ARGS=""
          if [ "${{ inputs.enable-race }}" = "true" ]; then ARGS="$ARGS -race"; fi
          if [ "${{ inputs.enable-coverage }}" = "true" ]; then ARGS="$ARGS -coverprofile=coverage.out"; fi
          go test $ARGS ${{ inputs.test-paths }}
      - if: inputs.enable-coverage
        uses: codecov/codecov-action@v6
        with:
          files: ${{ inputs.working-directory }}/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Hand coverage to the SonarQube job
        if: inputs.enable-sonar && inputs.enable-coverage
        uses: actions/upload-artifact@v5
        with:
          name: sonar-coverage-${{ inputs.sonar-project-key || github.event.repository.name }}
          path: ${{ inputs.working-directory }}/coverage.out
          if-no-files-found: warn
          retention-days: 1
      # Monorepo path: upload this module's Go coverprofile under a unique artifact
      # name so a single repo-level Sonar scan (projectBaseDir=.) can merge several
      # modules. Go coverprofiles carry package import paths, not file paths, so no
      # SF: rebase is needed — Sonar resolves them against projectBaseDir directly.
      - name: Upload coverage for repo-level scan
        if: inputs.coverage-upload-as != '' && inputs.enable-coverage
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.coverage-upload-as }}
          path: ${{ inputs.working-directory }}/coverage.out
          if-no-files-found: warn
          retention-days: 1

  security:
    name: Security
    needs: detect
    if: |
      needs.detect.outputs.has_go == 'true' && inputs.enable-vulncheck && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && format('{0}/{1}', inputs.working-directory, inputs.go-version-file) || '' }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          set +e
          govulncheck ${{ inputs.test-paths }}
          EXIT=$?
          set -e
          if [ "${{ inputs.fail-on-vulncheck }}" = "true" ]; then
            exit $EXIT
          fi
          if [ "$EXIT" != "0" ]; then
            echo "::warning::govulncheck found vulnerabilities (non-blocking — set fail-on-vulncheck: true to act on them)"
          fi

  build:
    name: Build
    needs: [detect, lint, test]
    if: |
      always() && needs.detect.outputs.has_go == 'true' && inputs.enable-build &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') && (
        !inputs.skip-on-release-commit ||
        github.event_name != 'push' ||
        !startsWith(github.event.head_commit.message, 'chore(release):')
      )
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && format('{0}/{1}', inputs.working-directory, inputs.go-version-file) || '' }}
          cache: true
      - name: Build
        run: go build -o bin/ ${{ inputs.build-paths }}

  sonarqube:
    name: SonarQube
    # !cancelled() so analysis still runs when tests fail (coverage may be partial)
    # or when the test job is skipped (enable-test / enable-coverage off).
    if: inputs.enable-sonar && !cancelled()
    # needs: test so the coverage artifact exists before the scan downloads it.
    needs: test
    uses: FerrLabs/.github/.github/workflows/reusable-sonarqube-scan.yml@main
    with:
      runner: ${{ inputs.runner }}
      working-directory: ${{ inputs.sonar-base-dir || inputs.working-directory }}
      project-key: ${{ inputs.sonar-project-key }}
      coverage-artifact: ${{ (inputs.enable-coverage && format('sonar-coverage-{0}', inputs.sonar-project-key || github.event.repository.name)) || '' }}
      args: ${{ inputs.enable-coverage && '-Dsonar.go.coverage.reportPaths=.sonarcov/coverage.out' || '' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
