name: Renovate

# Runs Renovate self-hosted under a dedicated GitHub App identity
# (`ferrlabs-renovate[bot]`) installed in the FerrLabs org. Every commit,
# PR, branch, and issue Renovate creates is attributed to the bot — not
# to whichever human happens to own the PAT.
#
# Required org-level secrets (Settings → Secrets and variables → Actions):
#   - RENOVATE_APP_CLIENT_ID     : GitHub App Client ID (App settings → "Client ID", e.g. Iv23li…)
#   - RENOVATE_APP_PRIVATE_KEY   : PEM-encoded private key (full content incl. BEGIN/END lines)
#
# To create the App: see the README in this repo or
# https://github.com/organizations/FerrLabs/settings/apps/new
#
# Required App permissions:
#   Repository → Contents (R/W), Issues (R/W), Pull requests (R/W),
#                Workflows (R/W), Statuses (R/W), Metadata (R),
#                Members (R), Dependabot alerts (R),
#                Packages (R)   ← REQUIRED for @ferrlabs/* lookups on GHCR npm
#   Organization → Members (R)
# Install on: All repositories under FerrLabs.
#
# About `Packages (R)`: @ferrlabs/ui, @ferrlabs/ui-astro,
# @ferrlabs/ui-foundation are published to npm.pkg.github.com (GHCR) and
# require auth to even READ. Without this permission Renovate gets 401 on
# every lookup and silently emits no PRs for internal libs — third-party
# crates / npm packages still work because they're public on crates.io /
# npmjs.org. The first run after granting the permission opens the backlog
# all at once. Verify via the bootstrap-check step below: it fails the
# workflow with an actionable message if the token can't read the registry.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options: ["debug", "info", "warn", "error"]
      repoFilter:
        description: 'Repo filter (e.g. "FerrLabs/UI" to scan a single repo)'
        required: false
        default: ""

concurrency:
  group: renovate
  cancel-in-progress: false

permissions: {}

jobs:
  plan:
    name: Plan shards
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      # App token (not GITHUB_TOKEN) — needed to enumerate the private org
      # repos when fanning out one shard per live *-Cloud repo. Identical
      # org-wide App install + unpinned tag as the renovate job's token below:
      # org-wide read is inherent to discovering the repo list, so zizmor's
      # github-app / unpinned-uses are suppressed here to match that already
      # accepted pattern rather than flagged as net-new on this step.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3 # zizmor: ignore[github-app,unpinned-uses]
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: FerrLabs # zizmor: ignore[github-app]
      # A manual repoFilter collapses to one `manual` shard. A scheduled run
      # fans out into disjoint shards, computed from the live repo list:
      #   - one shard per non-archived *-Cloud repo (each is a heavy
      #     api+web+docker monorepo, worth isolating so one slow/failing repo
      #     doesn't hold up the rest),
      #   - grouped shards for tools / libs / infra,
      #   - a `rest` catch-all owning every other non-archived repo.
      # Shards are mutually exclusive and jointly exhaustive: a repo lands in
      # exactly one, and any new repo not matching a named group falls into
      # `rest`, so nothing is processed twice and nothing is silently dropped.
      - name: Compute shard matrix
        id: plan
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_FILTER: ${{ inputs.repoFilter }}
        run: |
          set -euo pipefail
          if [ -n "${REPO_FILTER}" ]; then
            matrix=$(jq -cn --arg f "${REPO_FILTER}" '{include:[{shard:"manual",filter:$f}]}')
            echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          repos=$(gh api --paginate "orgs/FerrLabs/repos?per_page=100&type=all" \
            --jq '[.[] | select(.archived == false) | .name]')

          matrix=$(jq -cn \
            --argjson repos "${repos}" \
            --argjson tools '["FerrFlow","FerrVault","Benchmarks","Fixtures",".github","MCP","Changelog","Status"]' \
            --argjson libs  '["Claude-Agents","actions-runner-image","UI","Kit"]' \
            --argjson infra '["Infra","Kubernetes"]' '
            def flt($xs): [$xs[] | "FerrLabs/" + .] | join(",");
            ($tools + $libs + $infra) as $named
            | ($repos | map(select(endswith("-Cloud")))) as $cloud
            | ($repos | map(select((endswith("-Cloud") | not) and (($named | index(.)) | not)))) as $rest
            | ( ($cloud | map({shard: ., filter: ("FerrLabs/" + .)}))
                + [ {shard: "tools", filter: (flt($tools))},
                    {shard: "libs",  filter: (flt($libs))},
                    {shard: "infra", filter: (flt($infra))} ]
                + (if ($rest | length) > 0 then [{shard: "rest", filter: (flt($rest))}] else [] end)
              ) as $inc
            | {include: $inc}')
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  renovate:
    name: Run Renovate (${{ matrix.shard }})
    needs: plan
    # Shards are disjoint (a repo lands in exactly one), so nothing is
    # processed twice or dropped. fail-fast off so one shard can't cancel the
    # others mid-sweep. max-parallel caps concurrent Renovate legs — with one
    # shard per *-Cloud repo plus the grouped shards this is ~12 legs, and
    # unthrottled they'd trip GitHub's secondary rate limits.
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    # GitHub-hosted runner: free for this public repo, and the self-hosted
    # `ferrlabs-k8s` group has allows_public_repositories=false (security
    # default — don't expose the k8s cluster to public-repo workflows).
    # Renovate only needs node + network reach to npm/crates.io/GHCR, no
    # cluster-side resources.
    runs-on: ubuntu-latest
    # packages: read lets this job's GITHUB_TOKEN pull the private @ferrlabs/*
    # GHCR npm packages (App installation tokens can't read GHCR — known
    # limitation). Each package must list FerrLabs/.github under "Manage
    # Actions access" for this token to be granted.
    permissions:
      packages: read
    steps:
      # Mint a short-lived (1h) installation token from the GitHub App.
      # Replaces the long-lived PAT we used previously — commits and PRs
      # are now attributed to `ferrlabs-renovate[bot]` instead of a human.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: FerrLabs

      - name: Checkout config
        uses: actions/checkout@v7

      - name: Probe GHCR npm read access (informational)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://npm.pkg.github.com/@ferrlabs%2Fui-astro")
          if [ "${status}" = "200" ]; then
            echo "ok — GITHUB_TOKEN can read @ferrlabs/* on GHCR (${status})"
          else
            # Downgraded to warning: this probe historically false-positived
            # when the App had Packages:read granted AND the consumer repos
            # plus .github were listed under "Manage Actions access" on
            # every @ferrlabs/* package. App tokens vs GHCR npm have known
            # rough edges; let Renovate itself decide whether it can reach
            # the packages — if it can't, the next run will just skip
            # @ferrlabs/* updates silently, which is recoverable.
            echo "::warning::Probe returned ${status} from npm.pkg.github.com." \
                 "GITHUB_TOKEN can't read @ferrlabs/* — verify each @ferrlabs/*" \
                 "GHCR package lists FerrLabs/.github under Settings → Manage" \
                 "Actions access, and that this job keeps permissions: packages: read."
          fi

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: default.json
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: ${{ matrix.filter }}
          RENOVATE_PLATFORM: "github"
          RENOVATE_REPOSITORY_CACHE: "enabled"
          # Private Kellnr cargo registry, declared via env so Renovate's
          # `cargo update` lockfile runs resolve it. The registry lives in each
          # repo's api/.cargo/config.toml, but Renovate invokes cargo from the
          # repo root where that subdir config isn't discovered ("registry index
          # was not found: kellnr") — env vars are honoured regardless of cwd.
          CARGO_REGISTRIES_KELLNR_INDEX: "sparse+https://crates.ferrlabs.com/api/v1/crates/"
          CARGO_REGISTRIES_KELLNR_TOKEN: ${{ secrets.CARGO_REGISTRIES_KELLNR_TOKEN }}
          # Identity Renovate must recognise as its own so it keeps
          # auto-rebasing its PRs instead of assuming a human edited them.
          # Must byte-match the author GitHub attributes to the App bot when
          # it commits via the API: `<bot-user-id>+<slug>[bot]@users.noreply.github.com`.
          # create-github-app-token exposes no bot/user-id output (only token,
          # installation-id, app-slug), so the previous `outputs.bot-id` was
          # empty — the malformed author never matched the real commits and
          # Renovate blocked every rebase. The bot user id (282300760) is
          # immutable for this App, so it is pinned here.
          RENOVATE_GIT_AUTHOR: "${{ steps.app-token.outputs.app-slug }}[bot] <282300760+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>"
          RENOVATE_USERNAME: "${{ steps.app-token.outputs.app-slug }}[bot]"
          # Auth for GHCR npm registry (where @ferrlabs/* live). The npm
          # hostRule uses GITHUB_TOKEN (not the App token): App installation
          # tokens can't read GHCR packages, but a repo's GITHUB_TOKEN can when
          # the package grants FerrLabs/.github "Manage Actions access". The
          # packageRule in default.json points registryUrls at npm.pkg.github.com.
          # The github-tags / git-refs hostRules below keep the App token for
          # cross-repo octokit calls (release notes) and the git-refs datasource
          # fetching FerrLabs/Kit refs/heads/main.
          RENOVATE_HOST_RULES: |
            [
              {
                "matchHost": "npm.pkg.github.com",
                "hostType": "npm",
                "token": "${{ secrets.GITHUB_TOKEN }}"
              },
              {
                "matchHost": "github.com",
                "hostType": "github-tags",
                "token": "${{ steps.app-token.outputs.token }}"
              },
              {
                "matchHost": "github.com",
                "hostType": "git-refs",
                "token": "${{ steps.app-token.outputs.token }}"
              },
              {
                "matchHost": "crates.ferrlabs.com",
                "hostType": "cargo",
                "token": "${{ secrets.CARGO_REGISTRIES_KELLNR_TOKEN }}"
              }
            ]
