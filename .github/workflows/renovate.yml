name: Renovate

# Runs Renovate self-hosted under a dedicated GitHub App identity
# (`ferrlabs-renovate[bot]`) installed in the FerrLabs org. Every commit,
# PR, branch, and issue Renovate creates is attributed to the bot — not
# to whichever human happens to own the PAT.
#
# Required org-level secrets (Settings → Secrets and variables → Actions):
#   - RENOVATE_APP_ID            : GitHub App numeric ID (from app's settings page)
#   - RENOVATE_APP_PRIVATE_KEY   : PEM-encoded private key (full content incl. BEGIN/END lines)
#
# To create the App: see the README in this repo or
# https://github.com/organizations/FerrLabs/settings/apps/new
#
# Required App permissions:
#   Repository → Contents (R/W), Issues (R/W), Pull requests (R/W),
#                Workflows (R/W), Statuses (R/W), Metadata (R),
#                Members (R), Dependabot alerts (R),
#                Packages (R)   ← REQUIRED for @ferrlabs/* lookups on GHCR npm
#   Organization → Members (R)
# Install on: All repositories under FerrLabs.
#
# About `Packages (R)`: @ferrlabs/ui, @ferrlabs/ui-astro,
# @ferrlabs/ui-foundation are published to npm.pkg.github.com (GHCR) and
# require auth to even READ. Without this permission Renovate gets 401 on
# every lookup and silently emits no PRs for internal libs — third-party
# crates / npm packages still work because they're public on crates.io /
# npmjs.org. The first run after granting the permission opens the backlog
# all at once. Verify via the bootstrap-check step below: it fails the
# workflow with an actionable message if the token can't read the registry.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options: ["debug", "info", "warn", "error"]
      repoFilter:
        description: 'Repo filter (e.g. "FerrLabs/UI" to scan a single repo)'
        required: false
        default: ""

concurrency:
  group: renovate
  cancel-in-progress: false

permissions: {}

jobs:
  renovate:
    name: Run Renovate
    # GitHub-hosted runner: free for this public repo, and the self-hosted
    # `ferrlabs-k8s` group has allows_public_repositories=false (security
    # default — don't expose the k8s cluster to public-repo workflows).
    # Renovate only needs node + network reach to npm/crates.io/GHCR, no
    # cluster-side resources.
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (1h) installation token from the GitHub App.
      # Replaces the long-lived PAT we used previously — commits and PRs
      # are now attributed to `ferrlabs-renovate[bot]` instead of a human.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: FerrLabs

      - name: Checkout config
        uses: actions/checkout@v6

      - name: Probe GHCR npm read access (informational)
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://npm.pkg.github.com/@ferrlabs%2Fui-astro")
          if [ "${status}" = "200" ]; then
            echo "ok — App token can read @ferrlabs/* on GHCR (${status})"
          else
            # Downgraded to warning: this probe historically false-positived
            # when the App had Packages:read granted AND the consumer repos
            # plus .github were listed under "Manage Actions access" on
            # every @ferrlabs/* package. App tokens vs GHCR npm have known
            # rough edges; let Renovate itself decide whether it can reach
            # the packages — if it can't, the next run will just skip
            # @ferrlabs/* updates silently, which is recoverable.
            echo "::warning::Probe returned ${status} from npm.pkg.github.com." \
                 "If Renovate doesn't open @ferrlabs/* PRs, double-check:" \
                 "(1) App has Repository → Packages → Read-only at" \
                 "https://github.com/organizations/FerrLabs/settings/apps/ferrlabs-renovate/permissions" \
                 "(2) installation has no pending permission accept at" \
                 "https://github.com/organizations/FerrLabs/settings/installations" \
                 "(3) each private @ferrlabs/* GHCR npm package lists .github" \
                 "under Settings → Manage Actions access."
          fi

      - name: Run Renovate
        uses: renovatebot/github-action@v40.3.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: default.json
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: ${{ inputs.repoFilter || 'FerrLabs/*' }}
          RENOVATE_PLATFORM: "github"
          RENOVATE_REPOSITORY_CACHE: "enabled"
          # Identity of every commit / PR / issue Renovate makes. Format
          # `<numeric-app-id>+<bot-slug>[bot]@users.noreply.github.com`
          # is the GitHub-canonical bot author. The numeric prefix is
          # what GitHub needs to attribute correctly in the timeline UI;
          # the bot-id env var is set from the token-mint step's output.
          RENOVATE_GIT_AUTHOR: "${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-token.outputs.bot-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>"
          RENOVATE_USERNAME: "${{ steps.app-token.outputs.app-slug }}[bot]"
          # Auth for GHCR npm registry (where @ferrlabs/* live).
          # Without this, lookups for @ferrlabs/ui, @ferrlabs/ui-astro,
          # @ferrlabs/ui-foundation fail with `no-result` because Renovate
          # tries npmjs.org by default. The packageRule in default.json
          # overrides registryUrls to npm.pkg.github.com; this token lets
          # us actually authenticate against it.
          # Same token is used by the github-actions hostRule for cross-repo
          # actions (octokit calls when resolving release notes for things
          # like FerrLabs/UI tags) and by the git-refs datasource fetching
          # FerrLabs/Kit refs/heads/main.
          RENOVATE_HOST_RULES: |
            [
              {
                "matchHost": "npm.pkg.github.com",
                "hostType": "npm",
                "token": "${{ steps.app-token.outputs.token }}"
              },
              {
                "matchHost": "github.com",
                "hostType": "github-tags",
                "token": "${{ steps.app-token.outputs.token }}"
              },
              {
                "matchHost": "github.com",
                "hostType": "git-refs",
                "token": "${{ steps.app-token.outputs.token }}"
              }
            ]
