name: Reusable — SonarQube scan

# Static code analysis against the self-hosted SonarQube
# (https://sonar.ferrlabs.com). Callers pass SONAR_TOKEN (org secret) and
# optionally override SONAR_HOST_URL via the org variable.

on:
  workflow_call:
    inputs:
      runner:
        description: 'Override the runner label. Empty (default) auto-selects by repo visibility: private repos use the self-hosted ferrlabs-k8s pool (ferrlabs-k8s-large for build/test jobs), public repos use ubuntu-latest.'
        type: string
        default: ''
      working-directory:
        description: 'Project root to analyse (sonar.projectBaseDir)'
        type: string
        default: '.'
      project-key:
        description: 'SonarQube project key (defaults to the repository name)'
        type: string
        default: ''
      exclusions:
        description: 'Comma-separated sonar.exclusions globs (keeps root/monorepo scans clean)'
        type: string
        default: '**/node_modules/**,**/dist/**,**/build/**,**/target/**,**/coverage/**,**/.next/**,**/out/**,**/vendor/**,**/*.min.js,**/*.min.css'
      args:
        description: 'Extra sonar-scanner arguments (e.g. -Dsonar.coverageReportPaths=...)'
        type: string
        default: ''
      coverage-artifact:
        description: 'Name of an uploaded artifact holding the coverage report (lcov). Downloaded into <working-directory>/.sonarcov before the scan so callers can point reportPaths at .sonarcov/<file> via args.'
        type: string
        default: ''
      coverage-artifact-pattern:
        description: 'Glob of coverage artifacts to download+merge into <working-directory>/.sonarcov (one project, several components). Each artifact should carry a uniquely-named, repo-root-rebased lcov; point reportPaths at .sonarcov/<name>.lcov via args.'
        type: string
        default: ''
      sast:
        description: 'Run OpenGrep (SAST) + gitleaks and import their findings into SonarQube as external issues (dashboard consolidation). Report-only — never fails the scan on its own.'
        type: boolean
        default: false
      sast-config:
        description: 'OpenGrep ruleset for the SAST import (path/URL for `opengrep scan -f`). Empty clones the community opengrep/opengrep-rules set.'
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sonarqube:
    name: SonarQube analysis
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so SonarQube can attribute new-code and blame.
          fetch-depth: 0

      # Coverage is produced in an upstream job (test/coverage) and handed over
      # as an artifact. Land it inside the analysed dir so reportPaths (relative
      # to projectBaseDir) and the lcov's own SF: paths both resolve correctly.
      - name: Download coverage report
        if: inputs.coverage-artifact != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: ${{ inputs.coverage-artifact }}
          path: ${{ inputs.working-directory }}/.sonarcov

      - name: Download coverage reports (multi-component)
        if: inputs.coverage-artifact-pattern != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          pattern: ${{ inputs.coverage-artifact-pattern }}
          merge-multiple: true
          path: ${{ inputs.working-directory }}/.sonarcov

      # OpenGrep (SAST) + gitleaks → SonarQube external issues. Report-only; the
      # findings surface on the Sonar project alongside the SARIF the security-scan
      # workflow already sends to the GitHub Security tab. Runs before the scan so
      # the generated report is on disk when sonar-scanner reads it.
      - name: SAST → SonarQube external issues
        id: sast
        if: inputs.sast
        uses: FerrLabs/.github/.github/actions/sast-external-issues@main
        with:
          working-directory: ${{ inputs.working-directory }}
          sast-config: ${{ inputs.sast-config }}

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonar.ferrlabs.com' }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.project-key || github.event.repository.name }}
            -Dsonar.exclusions=${{ inputs.exclusions }}
            ${{ steps.sast.outputs.scanner-args }}
            ${{ inputs.args }}
