name: Reusable — SonarQube scan

# Static code analysis against the self-hosted SonarQube
# (https://sonar.ferrlabs.com). Callers pass SONAR_TOKEN (org secret) and
# optionally override SONAR_HOST_URL via the org variable.

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label'
        type: string
        default: 'ferrlabs-k8s'
      working-directory:
        description: 'Project root to analyse (sonar.projectBaseDir)'
        type: string
        default: '.'
      project-key:
        description: 'SonarQube project key (defaults to the repository name)'
        type: string
        default: ''
      args:
        description: 'Extra sonar-scanner arguments (e.g. -Dsonar.coverageReportPaths=...)'
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sonarqube:
    name: SonarQube analysis
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so SonarQube can attribute new-code and blame.
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonar.ferrlabs.com' }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.project-key || github.event.repository.name }}
            ${{ inputs.args }}
