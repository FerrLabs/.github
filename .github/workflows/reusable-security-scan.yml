name: Reusable — Security scan

on:
  workflow_call:
    inputs:
      gitleaks-config:
        description: 'Path to a custom gitleaks config (optional)'
        type: string
        required: false
        default: ''
      sast-config:
        description: 'OpenGrep ruleset for the SAST job. A path/URL passed to `opengrep scan -f`. Empty (default) shallow-clones the community `opengrep/opengrep-rules` set.'
        type: string
        required: false
        default: ''
      osv-scan-args:
        description: 'Extra args for osv-scanner'
        type: string
        required: false
        default: '--recursive .'
      fail-on-cve:
        description: 'Fail the workflow on any CVE found by osv-scanner'
        type: boolean
        required: false
        default: false
      fail-on-secret:
        description: 'Fail the workflow on any secret found by gitleaks or trufflehog'
        type: boolean
        required: false
        default: false
      fail-on-actions:
        description: 'Fail the workflow on any GitHub Actions security finding from zizmor'
        type: boolean
        required: false
        default: false
      fail-on-sast:
        description: 'Fail the workflow on any SAST finding from OpenGrep'
        type: boolean
        required: false
        default: false
      fail-on-snyk:
        description: 'Fail the workflow on vulnerabilities found by Snyk. Quota-exhaustion and Snyk errors never fail regardless of this.'
        type: boolean
        required: false
        default: false
      snyk-test-args:
        description: 'Extra args for `snyk test` (e.g. `--all-projects --severity-threshold=high`)'
        type: string
        required: false
        default: '--all-projects'
      runner:
        description: 'Override the runner label. Empty (default) auto-selects by repo visibility: private repos use the self-hosted ferrlabs-k8s pool (ferrlabs-k8s-large for build/test jobs), public repos use ubuntu-latest.'
        type: string
        required: false
        default: ''
      run-on-private:
        description: 'Set to `true` to run the scans on private repos too. Defaults to `false` because GitHub-hosted runners consume billed minutes on private repos and our security scans are best-effort hygiene, not blocking gates. Public repos always run (Actions are free for them).'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    if: ${{ !github.event.repository.private || inputs.run-on-private }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/gitleaks" version
      - name: Run gitleaks
        env:
          GITLEAKS_CONFIG: ${{ inputs.gitleaks-config }}
        run: |
          ARGS=(detect --source . --redact --verbose --report-format sarif --report-path gitleaks.sarif)
          if [ -n "$GITLEAKS_CONFIG" ]; then
            ARGS+=(--config "$GITLEAKS_CONFIG")
          fi
          set +e
          gitleaks "${ARGS[@]}"
          EXIT=$?
          set -e
          if [ "${{ inputs.fail-on-secret }}" = "true" ]; then
            exit $EXIT
          fi
          if [ "$EXIT" != "0" ]; then
            echo "::warning::gitleaks found potential secrets — see SARIF in Security tab. Set fail-on-secret: true to make this blocking."
          fi
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
        continue-on-error: true

  osv-scanner:
    name: osv-scanner (CVE)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    if: ${{ !github.event.repository.private || inputs.run-on-private }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Detect Go module
        id: detect
        run: |
          if [ -f go.mod ] || find . -name go.mod -not -path './.git/*' -not -path './node_modules/*' | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install osv-scanner
        if: steps.detect.outputs.has_go == 'false'
        run: |
          VERSION=2.0.2
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${VERSION}/osv-scanner_linux_amd64" \
            -o "$RUNNER_TEMP/bin/osv-scanner"
          chmod +x "$RUNNER_TEMP/bin/osv-scanner"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/osv-scanner" --version
      - name: Skip osv-scanner on Go repos
        if: steps.detect.outputs.has_go == 'true'
        run: |
          echo "Go module detected — osv-scanner is skipped on Go repos because the released binary"
          echo "(built with Go 1.24) cannot parse newer go.mod files (1.25+) reliably."
          echo "Go vulnerability scanning is delegated to govulncheck in the ci-go workflow template."
          echo '{"runs":[{"tool":{"driver":{"name":"osv-scanner","informationUri":"https://osv.dev"}},"results":[]}],"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0"}' > osv-results.sarif
      - name: Run osv-scanner
        if: steps.detect.outputs.has_go == 'false'
        run: |
          set +e
          osv-scanner scan source \
            --output=osv-results.sarif --format=sarif \
            ${{ inputs.osv-scan-args }}
          EXIT=$?
          set -e
          if [ "${{ inputs.fail-on-cve }}" = "true" ]; then
            exit $EXIT
          fi
      - name: Upload SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
        continue-on-error: true

  opengrep:
    name: opengrep (SAST)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    if: ${{ !github.event.repository.private || inputs.run-on-private }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install OpenGrep
        run: |
          VERSION=1.9.0
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/opengrep/opengrep/releases/download/v${VERSION}/opengrep_manylinux_x86" \
            -o "$RUNNER_TEMP/bin/opengrep"
          chmod +x "$RUNNER_TEMP/bin/opengrep"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/opengrep" --version
      - name: Resolve ruleset
        id: rules
        env:
          SAST_CONFIG: ${{ inputs.sast-config }}
        run: |
          if [ -n "$SAST_CONFIG" ]; then
            echo "path=$SAST_CONFIG" >> "$GITHUB_OUTPUT"
          else
            # OpenGrep bundles no rules; the Semgrep registry `auto` shorthand is
            # not reliably available on the fork, so we ship the community set.
            git clone --depth 1 https://github.com/opengrep/opengrep-rules.git "$RUNNER_TEMP/opengrep-rules"
            echo "path=$RUNNER_TEMP/opengrep-rules" >> "$GITHUB_OUTPUT"
          fi
      - name: Run OpenGrep
        run: |
          set +e
          opengrep scan \
            --sarif-output=opengrep.sarif \
            --error \
            -f "${{ steps.rules.outputs.path }}" \
            .
          EXIT=$?
          set -e
          echo "opengrep exit: $EXIT"
          # opengrep/semgrep: 0 = clean, 1 = findings, >=2 = internal error.
          if [ "$EXIT" -ge 2 ]; then
            echo "::warning::OpenGrep errored (exit $EXIT) — not failing the scan."
            exit 0
          fi
          if [ "$EXIT" = "1" ]; then
            echo "::warning::OpenGrep found SAST issues — see the Security tab (SARIF). Set fail-on-sast: true to make this blocking."
            if [ "${{ inputs.fail-on-sast }}" = "true" ]; then
              exit 1
            fi
          fi
          exit 0
      - name: Upload SARIF
        if: always() && hashFiles('opengrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: opengrep.sarif
          category: opengrep
        continue-on-error: true

  zizmor:
    name: zizmor (GitHub Actions security)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    if: ${{ !github.event.repository.private || inputs.run-on-private }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install zizmor
        env:
          PIP_BREAK_SYSTEM_PACKAGES: '1'
        run: |
          python3 -m pip install --user zizmor==1.25.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" --version
      - name: Run zizmor
        env:
          # Enables zizmor's online audits (e.g. unpinned/unhashed action refs).
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(ls -A .github/workflows 2>/dev/null)" ]; then
            echo "No .github/workflows — nothing for zizmor to scan."
            exit 0
          fi
          # zizmor exits 0 in SARIF mode even with findings, so gate on the
          # finding count rather than the exit code.
          zizmor --format sarif . > zizmor.sarif || true
          COUNT=$(jq '[.runs[0].results[]] | length' zizmor.sarif 2>/dev/null || echo 0)
          echo "zizmor findings: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::zizmor found $COUNT GitHub Actions security finding(s) — see the Security tab (SARIF). Set fail-on-actions: true to make this blocking."
            if [ "${{ inputs.fail-on-actions }}" = "true" ]; then
              exit 1
            fi
          fi
      - name: Upload SARIF
        if: always() && hashFiles('zizmor.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
        continue-on-error: true

  trufflehog:
    name: trufflehog (secrets, deep history)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && (!github.event.repository.private || inputs.run-on-private) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/trufflehog" --version
      - name: Run trufflehog (filesystem + git history)
        run: |
          set +e
          trufflehog git file://. --only-verified --fail --no-update --json > trufflehog.json
          EXIT=$?
          set -e
          echo "trufflehog exit: $EXIT"
          if [ -s trufflehog.json ]; then
            echo "::warning::trufflehog found verified secrets — see artifact"
            jq -r '. | "\(.SourceMetadata.Data.Git.repository) \(.DetectorName) \(.Raw)"' trufflehog.json | head -20
          fi
          if [ "${{ inputs.fail-on-secret }}" = "true" ]; then
            exit $EXIT
          fi
      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trufflehog-findings
          path: trufflehog.json
          retention-days: 14
          if-no-files-found: ignore

  snyk:
    name: snyk (deps)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    if: ${{ !github.event.repository.private || inputs.run-on-private }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Guard on SNYK_TOKEN
        id: guard
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::notice::SNYK_TOKEN not set — skipping Snyk scan (soft pass)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Snyk CLI
        if: steps.guard.outputs.run == 'true'
        run: npm install -g snyk@1
      - name: Run snyk test (soft-pass on quota / errors)
        if: steps.guard.outputs.run == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          OUT=$(snyk test ${{ inputs.snyk-test-args }} --sarif-file-output=snyk.sarif 2>&1)
          EXIT=$?
          set -e
          echo "$OUT"
          # Monthly private-test quota exhaustion must never show as a failing check.
          if echo "$OUT" | grep -qiE "used your limit|monthly limit|test limit|reached your.*limit|limit of (private )?tests"; then
            echo "::warning::Snyk test quota exhausted — soft pass. Raise the plan quota or wait for the monthly reset."
            exit 0
          fi
          # snyk exit codes: 0 = no vulns, 1 = vulns found, 2 = error, 3 = no supported projects.
          if [ "$EXIT" -ge 2 ]; then
            echo "::warning::Snyk errored (exit $EXIT) — not failing the scan."
            exit 0
          fi
          if [ "$EXIT" = "1" ]; then
            echo "::warning::Snyk found vulnerabilities — see the Security tab (SARIF). Set fail-on-snyk: true to make this blocking."
            if [ "${{ inputs.fail-on-snyk }}" = "true" ]; then
              exit 1
            fi
          fi
          exit 0
      - name: Upload SARIF
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: snyk.sarif
          category: snyk
        continue-on-error: true
