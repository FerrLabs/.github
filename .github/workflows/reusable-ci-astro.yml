name: Reusable — CI Astro Site

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Astro project root'
        type: string
        default: '.'
      runner:
        description: 'Override the runner label. Empty (default) auto-selects by repo visibility: private repos use the self-hosted ferrlabs-k8s (medium) pool, public repos use ubuntu-latest.'
        type: string
        default: ''
      node-version:
        type: string
        default: '24'
      pnpm-version:
        type: string
        default: '10'
      install-args:
        type: string
        default: '--frozen-lockfile'
      cache-dependency-path:
        description: 'Lockfile path for the setup-node cache. Set to the root lockfile in pnpm-workspace monorepos where working-directory is a sub-package. Defaults to working-directory/pnpm-lock.yaml.'
        type: string
        default: ''
      registry-url:
        type: string
        default: 'https://npm.pkg.github.com'
      registry-scope:
        type: string
        default: '@ferrlabs'
      astro-check-args:
        description: 'Extra args for astro check'
        type: string
        default: ''
      lint-script:
        type: string
        default: 'lint'
      build-script:
        type: string
        default: 'build'
      i18n-script:
        description: 'Script name for i18n parity check (omit if not present)'
        type: string
        default: 'check:i18n'
      dist-path:
        description: 'Path to built dist (relative to working-directory)'
        type: string
        default: 'dist'
      enable-astro-check:
        type: boolean
        default: true
      enable-lint:
        type: boolean
        default: true
      enable-build:
        type: boolean
        default: true
      enable-i18n:
        type: boolean
        default: true
      enable-lighthouse:
        description: 'Run Lighthouse CI on PRs (requires LHCI_GITHUB_APP_TOKEN secret)'
        type: boolean
        default: false
      lighthouse-only-pr:
        description: 'Run Lighthouse only on pull_request events'
        type: boolean
        default: true
      lighthouse-version:
        type: string
        default: '0.14.x'
      enable-sonar:
        description: 'Run SonarQube static analysis (requires the SONAR_TOKEN secret). No coverage — Astro sites have no test/coverage job here.'
        type: boolean
        default: false
      sonar-project-key:
        description: 'SonarQube project key (defaults to the repo name; set per-call in monorepos to avoid colliding sub-projects)'
        type: string
        default: ''
      sonar-base-dir:
        description: 'SonarQube projectBaseDir, when it differs from working-directory. Defaults to working-directory.'
        type: string
        default: ''
    secrets:
      # GitHub Packages read token. Either name works — `FERRLABS_PACKAGES_READ`
      # is the eventual canonical (post-rename), `FERRFLOW_PACKAGES_READ` is the
      # legacy from when the org was FerrFlow. Consumers can declare either.
      FERRLABS_PACKAGES_READ:
        required: false
      FERRFLOW_PACKAGES_READ:
        required: false
      LHCI_GITHUB_APP_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  build:
    name: Build & Check
    # medium (was -large): astro/vite build fits on 1 CPU / 3Gi and this frees
    # the scarce 2-slot -large tier for the heavy Rust build/test/coverage jobs.
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path != '' && inputs.cache-dependency-path || format('{0}/pnpm-lock.yaml', inputs.working-directory) }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.registry-scope }}
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FERRLABS_PACKAGES_READ || secrets.FERRFLOW_PACKAGES_READ || secrets.GITHUB_TOKEN }}
        run: pnpm install ${{ inputs.install-args }}
      - name: Astro check
        if: inputs.enable-astro-check
        run: pnpm exec astro check ${{ inputs.astro-check-args }}
      - name: Lint
        if: inputs.enable-lint
        run: pnpm run ${{ inputs.lint-script }}
      - name: Build
        if: inputs.enable-build
        run: pnpm run ${{ inputs.build-script }}
      - name: Upload dist (for downstream Lighthouse)
        if: inputs.enable-build && inputs.enable-lighthouse && (github.event_name == 'pull_request' || !inputs.lighthouse-only-pr)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: site-dist
          path: ${{ inputs.working-directory }}/${{ inputs.dist-path }}
          retention-days: 1

  i18n:
    name: i18n parity
    if: inputs.enable-i18n
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path != '' && inputs.cache-dependency-path || format('{0}/pnpm-lock.yaml', inputs.working-directory) }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.registry-scope }}
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FERRLABS_PACKAGES_READ || secrets.FERRFLOW_PACKAGES_READ || secrets.GITHUB_TOKEN }}
        run: pnpm install ${{ inputs.install-args }}
      - name: Check i18n parity
        run: pnpm run ${{ inputs.i18n-script }}
        continue-on-error: true

  lighthouse:
    name: Lighthouse CI
    needs: build
    if: inputs.enable-lighthouse && (github.event_name == 'pull_request' || !inputs.lighthouse-only-pr)
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'ferrlabs-k8s' || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist
          path: ${{ inputs.dist-path }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
      - name: Run Lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: |
          npm install -g @lhci/cli@${{ inputs.lighthouse-version }}
          lhci autorun --collect.staticDistDir=${{ inputs.dist-path }} || true

  sonarqube:
    name: SonarQube
    # Static analysis only — this Astro reusable has no test/coverage job, so no
    # coverage artifact is handed over. !cancelled() so it still runs alongside
    # build/lint regardless of their result.
    if: inputs.enable-sonar && !cancelled()
    needs: build
    uses: FerrLabs/.github/.github/workflows/reusable-sonarqube-scan.yml@2294da4af236f9adc02beaa3829afb499be0857a # main
    with:
      runner: ${{ inputs.runner }}
      working-directory: ${{ inputs.sonar-base-dir || inputs.working-directory }}
      project-key: ${{ inputs.sonar-project-key }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
